name: aihub_mobile
description: AI Hub Mobile - Unify multiple AI providers in one app (Flutter + Rust)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Rust bridge
  flutter_rust_bridge: ^2.4.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.3+2
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0

  # Navigation
  go_router: ^14.2.7

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Speech
  speech_to_text: ^7.0.0

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  file_picker: ^8.0.7
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_rust_bridge_codegen: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
