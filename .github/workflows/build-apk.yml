name: Build Android APK

on:
  push:
    branches: [ feature/mobile-flutter-rust ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
        continue-on-error: true

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: aihub-release-apk
          path: mobile/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: aihub-split-apks
          path: |
            mobile/flutter_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            mobile/flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            mobile/flutter_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
        if: always()

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/flutter_app/build/app/outputs/flutter-apk/app-release.apk
            mobile/flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
